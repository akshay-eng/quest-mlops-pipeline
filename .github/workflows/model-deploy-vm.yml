name: Quest MLOps — Model Deployment to Inference VM

on:
  workflow_dispatch:
    inputs:
      force_fail:
        description: 'Force Milvus health check failure (demo)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  IBM_VM_IP:   ${{ secrets.IBM_VM_IP }}
  IBM_VM_USER: ${{ secrets.IBM_VM_USER }}

jobs:
  # ── 1. Pre-flight: verify inference VM is ready ──────────────────────────────
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.IBM_VM_SSH_KEY }}" > /tmp/vm_key
          chmod 600 /tmp/vm_key

      # Force-fail path (demo toggle)
      - name: Simulate Milvus outage (demo only)
        if: ${{ github.event.inputs.force_fail == 'true' }}
        run: |
          echo "::error title=Milvus Vector DB::DEMO: force_fail=true — skipping real SSH check"
          echo "MILVUS_HEALTHY=false" >> $GITHUB_ENV

      # Real health check via SSH
      - name: Check Milvus Vector DB health
        if: ${{ github.event.inputs.force_fail != 'true' }}
        run: |
          HEALTH=$(ssh -o StrictHostKeyChecking=no \
                       -o ConnectTimeout=10 \
                       -i /tmp/vm_key \
                       $IBM_VM_USER@$IBM_VM_IP \
            "curl -s -o /dev/null -w '%{http_code}' http://localhost:9091/healthz 2>/dev/null || echo 000")

          echo "Milvus health check returned: $HEALTH"

          if [ "$HEALTH" = "200" ]; then
            echo "MILVUS_HEALTHY=true" >> $GITHUB_ENV
          else
            echo "MILVUS_HEALTHY=false" >> $GITHUB_ENV
          fi

      - name: Assert Milvus is healthy
        run: |
          if [ "$MILVUS_HEALTHY" != "true" ]; then
            echo "::error title=Milvus Vector DB Unhealthy::The Milvus vector database on the inference VM ($IBM_VM_IP) is not responding."
            echo ""
            echo "  Expected: HTTP 200 from http://$IBM_VM_IP:9091/healthz"
            echo "  Received: service is down or unreachable"
            echo ""
            echo "  ➜ Run the WINGS remediation agent to automatically restart Milvus and re-trigger this pipeline."
            exit 1
          fi
          echo "✅ Milvus Vector DB is healthy — proceeding with deployment"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/vm_key

  # ── 2. Deploy model artifacts to inference VM ────────────────────────────────
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.IBM_VM_SSH_KEY }}" > /tmp/vm_key
          chmod 600 /tmp/vm_key

      - name: Upload model artifacts to VM
        run: |
          echo "Uploading drug-test-classifier model to $IBM_VM_IP..."
          ssh -o StrictHostKeyChecking=no -i /tmp/vm_key $IBM_VM_USER@$IBM_VM_IP \
            "mkdir -p ~/quest/models"

          # Sync model directory if it exists, otherwise create a placeholder
          if [ -d "model/" ]; then
            scp -o StrictHostKeyChecking=no -i /tmp/vm_key -r model/ \
              $IBM_VM_USER@$IBM_VM_IP:~/quest/models/
          else
            ssh -o StrictHostKeyChecking=no -i /tmp/vm_key $IBM_VM_USER@$IBM_VM_IP \
              "echo '{\"version\": \"${{ github.sha }}\", \"status\": \"deployed\"}' \
               > ~/quest/models/deployment.json"
          fi

          echo "✅ Model artifacts uploaded"

      - name: Register model deployment on VM
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vm_key $IBM_VM_USER@$IBM_VM_IP << 'ENDSSH'
            set -e
            echo "Registering model with inference server..."

            # Write deployment manifest
            cat > ~/quest/models/manifest.json << EOF
          {
            "model_name": "drug-test-classifier",
            "version": "${{ github.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_id": "${{ github.run_id }}",
            "branch": "${{ github.ref_name }}",
            "status": "active"
          }
          EOF

            echo "✅ Deployment manifest written:"
            cat ~/quest/models/manifest.json
          ENDSSH

      - name: Smoke test — Milvus embedding round-trip
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/vm_key $IBM_VM_USER@$IBM_VM_IP \
            "curl -sf http://localhost:9091/healthz && echo '✅ Milvus smoke test passed'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/vm_key

  # ── 3. Summary ───────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Write summary
        run: |
          echo "### ✅ Quest MLOps Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`drug-test-classifier\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Inference VM | \`${{ secrets.IBM_VM_IP }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Vector DB | Milvus ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
